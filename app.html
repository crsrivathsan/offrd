<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Google Analytics 4 — Consent Mode v2 -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('consent', 'default', {
    analytics_storage: 'denied', ad_storage: 'denied',
    ad_user_data: 'denied', ad_personalization: 'denied',
    functionality_storage: 'granted', security_storage: 'granted',
    wait_for_update: 2000
  });
  gtag('set', 'anonymize_ip', true);

  function offrdTrack(eventName, params = {}) {
    if (typeof gtag === 'undefined') return;
    const user = JSON.parse(sessionStorage.getItem('offrd_user') || '{}');
    gtag('event', eventName, {
      app_name: 'Offrd',
      user_id_hash: user.id ? user.id.slice(0,8) : 'anon',
      ...params
    });
  }

  function loadGA4() {
    if (document.getElementById('ga4-script')) return;
    const stored = localStorage.getItem('offrd_consent');
    if (stored !== 'granted') return;
    gtag('consent', 'update', { analytics_storage: 'granted', ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied' });
    const s = document.createElement('script');
    s.id = 'ga4-script'; s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-H4VM6CR2N1';
    document.head.appendChild(s);
    s.onload = () => gtag('config', 'G-H4VM6CR2N1', { anonymize_ip: true });
  }
  loadGA4();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07080f">
<title>Offrd</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { margin: 0; background: #07080f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
  .loader { text-align: center; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(124,110,245,0.2); border-top-color: #7c6ef5; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #5a5a80; font-size: 14px; }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p>Loading Offrd…</p>
</div>
<script>
// ⚠ TODO: these are still placeholders — replace with your real Supabase
// project URL and anon/public key (Supabase dashboard → Settings → API).
const SUPABASE_URL = 'https://pfxbuqiqwpryvmrvrgfp.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.replace('/');
    return;
  }
  sessionStorage.setItem('offrd_user', JSON.stringify({
    id: session.user.id,
    email: session.user.email,
    name: session.user.user_metadata?.full_name || session.user.email,
    accessToken: session.access_token
  }));
  // Track successful sign-in
  gtag('event', 'login', {method: session.user.app_metadata?.provider || 'email'});

  // Send them into the app. If they already have a resume parsed from
  // earlier in this session, skip straight past upload to search; if
  // they already have search results, go straight to those.
  let dest = 'upload.html';
  try {
    const state = JSON.parse(sessionStorage.getItem('offrd_state') || 'null');
    if (state?.jobs?.length) dest = 'results.html';
    else if (state?.parsedProfile) dest = 'search.html';
  } catch (e) {}
  window.location.replace(dest);
})();
</script>
</body>
</html>
